<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NamY English V3 - Cổng Học Tập</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .portal-container { max-width: 1000px; margin: 30px auto; padding: 0 20px; }
        .course-header { text-align: center; margin-bottom: 40px; }
        
        .topic-card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 25px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border-left: 8px solid #3b82f6; }
        .exe-btn { display: inline-block; width: 100%; max-width: 290px; padding: 15px; margin: 8px; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.2s; border: 1px solid #cbd5e1; background: #f8fafc; vertical-align: top; box-sizing: border-box; }
        .exe-btn:hover { background: #eff6ff; border-color: #3b82f6; color: #1d4ed8; transform: translateY(-2px); box-shadow: 0 4px 6px rgba(59, 130, 246, 0.2); }
        .exe-learning { border-left: 4px solid #3b82f6; }
        .exe-practice { border-left: 4px solid #f59e0b; }

        /* THIẾT KẾ ĐỒ HỌA THANH TIẾN ĐỘ CHO MỤC NHỎ */
        .mini-progress-container { width: 100%; background-color: #e2e8f0; border-radius: 9999px; height: 6px; margin-top: 10px; overflow: hidden; }
        .mini-progress-bar { height: 100%; width: 0%; transition: width 0.3s ease; }
        .progress-learning-bar { background-color: #3b82f6; } /* Xanh dương cho lý thuyết */
        .progress-practice-bar { background-color: #10b981; } /* Xanh lá cho bài tập */
        .mini-progress-text { font-size: 0.8rem; color: #64748b; margin-top: 6px; display: block; font-weight: normal; }

        /* Giao diện Modal chung */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.7); display: none; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(4px); }
        .modal-content { background: #fff; width: 90%; max-width: 750px; border-radius: 16px; padding: 30px; position: relative; max-height: 85vh; display: flex; flex-direction: column; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 2rem; cursor: pointer; color: #94a3b8; line-height: 1; transition: 0.2s; }
        .close-btn:hover { color: #ef4444; transform: scale(1.1); }
        
        /* Giao diện Flashcard */
        .theory-card { background: #f0f9ff; border: 1px solid #bae6fd; padding: 20px; margin-bottom: 18px; border-radius: 12px; transition: 0.2s; }
        .theory-card:hover { border-color: #7dd3fc; box-shadow: 0 4px 12px rgba(56, 189, 248, 0.15); }
        .theory-title { font-weight: 800; color: #0369a1; font-size: 1.2rem; margin-bottom: 10px; border-bottom: 2px dashed #bae6fd; padding-bottom: 10px;}
        .theory-desc { color: #1e293b; line-height: 1.7; font-size: 1.05rem; }

        /* Giao diện Trắc nghiệm */
        .opt-label:hover { background: #f1f5f9; }
        .opt-label input { transform: scale(1.2); cursor: pointer; }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="navbar-brand">🎓 NamY English Portal</div>
        <div class="navbar-user">
            <span id="student-name">Học sinh</span>
            <button id="logout-btn" class="btn btn-sm btn-danger">Đăng xuất</button>
        </div>
    </div>

    <div class="portal-container">
        <div class="course-header">
            <h1 style="color: #1e3a8a; font-size: 2.5rem; margin-bottom: 10px;">Lộ Trình Chinh Phục CPE</h1>
            <p style="color: #64748b; font-size: 1.1rem;">Hãy hoàn thành Lý thuyết trước khi bước vào Đấu trường luyện tập nhé!</p>
        </div>

        <div id="syllabus-container">
            <div style="text-align:center; padding: 40px; color: #64748b;">⏳ Đang tải lộ trình học từ máy chủ...</div>
        </div>
    </div>

    <div id="learning-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="document.getElementById('learning-modal').style.display='none'">&span;</span>
            <h2 id="learning-title" style="color: #1d4ed8; margin-top: 0; padding-right: 30px; border-bottom: 3px solid #bfdbfe; padding-bottom: 15px;">Tiêu Đề Bài Học</h2>
            
            <div id="learning-content" style="margin-top: 15px; overflow-y: auto; padding-right: 15px; flex: 1;"></div>
            
            <button id="btn-finish-theory" class="btn btn-success btn-block" style="margin-top: 25px; padding: 15px; font-size: 1.1rem; border-radius: 10px;">✨ Em đã ghi nhớ phần này!</button>
        </div>
    </div>

    <div id="practice-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="document.getElementById('practice-modal').style.display='none'">&times;</span>
            <h2 id="practice-title" style="color: #b45309; margin-top: 0; padding-right: 30px; border-bottom: 3px solid #fde68a; padding-bottom: 15px;">Bài Tập</h2>
            
            <div id="practice-content" style="margin-top: 15px; overflow-y: auto; padding-right: 15px; flex: 1;"></div>
            
            <div id="practice-feedback" style="margin-top: 15px; font-weight: bold; font-size: 1.1rem; text-align: center;"></div>

            <div style="display:flex; gap: 15px; margin-top: 25px;">
                <button id="btn-check-q" class="btn btn-primary" style="flex:1; padding: 15px; font-size: 1.1rem; border-radius: 10px;" onclick="checkAnswer()">🔍 Kiểm tra đáp án</button>
                <button id="btn-next-q" class="btn btn-success" style="flex:1; padding: 15px; font-size: 1.1rem; border-radius: 10px; display:none;" onclick="nextQuestion()">Tiếp tục ➡️</button>
            </div>
        </div>
    </div>

    <script src="/static/js/api.js"></script>
    <script src="/static/js/auth.js"></script>
    <script src="/static/js/portal.js?v=v3_progress"></script>
</body>
</html>
