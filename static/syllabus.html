<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NamY V3 - Lộ Trình Học</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        /* Tự động đổi màu Navbar và nút bấm theo phân hệ */
        body.theme-learning .navbar { border-bottom: 4px solid #2563eb; }
        body.theme-practice .navbar { border-bottom: 4px solid #ea580c; }
        
        .week-card { background: #fff; border-radius: 16px; padding: 25px; margin-bottom: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid #e2e8f0; }
        .week-header { font-size: 1.6rem; font-weight: 800; margin-bottom: 20px; color: #0f172a; display: flex; align-items: center; gap: 10px; }
        
        .exercise-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 15px; }
        .exercise-btn { display: flex; justify-content: space-between; align-items: center; padding: 18px; background: #f8fafc; border: 2px solid #e2e8f0; border-radius: 12px; cursor: pointer; font-weight: 700; color: #334155; transition: all 0.2s ease; text-align: left;}
        
        /* Hiệu ứng Hover riêng cho từng phân hệ */
        body.theme-learning .exercise-btn:hover { border-color: #3b82f6; background: #eff6ff; color: #1e3a8a; transform: translateY(-3px); box-shadow: 0 6px 12px rgba(59, 130, 246, 0.15); }
        body.theme-practice .exercise-btn:hover { border-color: #f97316; background: #fff7ed; color: #9a3412; transform: translateY(-3px); box-shadow: 0 6px 12px rgba(249, 115, 22, 0.15); }
        
        .badge { background: #fef08a; color: #a16207; padding: 4px 10px; border-radius: 20px; font-size: 0.85rem; }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="navbar-brand" style="cursor:pointer;" onclick="window.location.href='/portal'">
            <span style="font-size: 1.2rem;">⬅ Trở về Cổng Chọn</span>
        </div>
        <div class="navbar-user">
            <button id="feedback-btn" class="btn btn-sm btn-purple">❓ Hỏi Thầy Nam</button>
            <button id="logout-btn" class="btn btn-sm btn-danger">Đăng xuất</button>
        </div>
    </div>

    <div class="container">
        <h2 id="syllabus-page-title" style="text-align: center; margin-bottom: 40px; font-size: 2.2rem; color: #1e293b;">Đang tải dữ liệu...</h2>
        <div id="course-content-area"></div>
    </div>

    <script src="/static/js/api.js"></script>
    <script src="/static/js/auth.js"></script>
    <script src="/static/js/student.js"></script>
</body>
</html>
